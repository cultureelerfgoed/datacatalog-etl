name: 'Local validation of datacatalog export' 

on:
  workflow_dispatch: 
    inputs:
      data-export-uri:
        description: 'Link to the json-ld export of the dataset.'
        required: true
        type: string
        default: 'http://api.linkeddata.cultureelerfgoed.nl/datasets/rce/datacatalog/download.jsonld'
      shacl-shape-uri:
        description: 'Link to the shacl shape.'
        required: true
        type: string
        default: 'https://github.com/netwerk-digitaal-erfgoed/dataset-register/raw/refs/heads/main/requirements/shacl.ttl'
    
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Download dataset export
      run: |
        wget '${{ inputs.data-export-uri }}' -O 'datacatalog.jsonld.gz'
        file 'datacatalog.jsonld.gz'
        gzip -d 'datacatalog.jsonld.gz'
    - name: Download shacl shape
      run: |
        wget '${{ inputs.shacl-shape-uri }}' -O 'shacl.ttl'
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyshacl
    - name: validate 
      run: |
        pyshacl -s shacl.ttl -m -i rdfs -a -j -f human -df json-ld datacatalog.jsonld
