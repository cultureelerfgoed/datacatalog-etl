name: 'RCE Datacatalog ETL' 

env:
  BASE_URI: 'https://linkeddata.cultureelerfgoed.nl/'
  SRC_URI: 'https://kennis.cultureelerfgoed.nl/api.php'
  ARTIFACT_PATH: 'artifact-data.jsonld'
  GRAPH_ID: 'datacatalog-latest-graph'
  DATASET_NAME: 'datacatalog'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      use-triplydb-cli:
        description: 'Use TriplyDB CLI to push?'
        default: false
        required: false
        type: boolean
      sync-on-push:
        description: 'Sync after push?'
        default: false
        required: false
        type: boolean

jobs:
  get-latest-datacatalog:
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Generate allowlist 
      run: |
        python src/allowlist_generator.py
    - name: Get latest datacatalog 
      run: |
        python src/datacatalog_service.py
      env:
        SRC_URI: ${{ env.SRC_URI }}
        TARGET_FILEPATH: ${{ env.ARTIFACT_PATH }}
        GRAPH_ID: ${{ env.GRAPH_ID }}   
    - name: Upload data artifact
      uses: actions/upload-artifact@v4
      with:
        name: data-artifact
        path: ${{ env.ARTIFACT_PATH }}
        overwrite: true
  
  validate-datacatalog:
    runs-on: ubuntu-latest
    needs: get-latest-datacatalog 
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Download data artifact
      uses: actions/download-artifact@v4
      with:
          name: data-artifact   
    - name: Validate via API
      run: |
          python src/validator.py
      env:
        TARGET_FILEPATH: ${{ env.ARTIFACT_PATH }}

  push-to-triply:
    runs-on: ubuntu-latest
    needs: [get-latest-datacatalog, validate-datacatalog]
    steps:
    - name: Download data artifact
      uses: actions/download-artifact@v4
      with:
          name: data-artifact
    - name: Push changes to TriplyDB API via cURL
      if: ${{ inputs.use-triplydb-cli == false }}
      run:  |
        curl -H 'Authorization: Bearer ${{ secrets.LDV_API_TOKEN }}' -X POST 'https://api.linkeddata.cultureelerfgoed.nl/datasets/rce/${{ env.DATASET_NAME }}/jobs'  -F file='${{ env.ARTIFACT_PATH }}'
    - name: Install dependencies
      if: ${{ inputs.use-triplydb-cli == true }}
      run: |
        wget 'https://static.triply.cc/cli/triplydb-linux'
        chmod +x triplydb-linux
    - name: Push changes to TriplyDB API via CLI
      if: ${{ inputs.use-triplydb-cli == true }}
      run: |
        ./triplydb-linux import-from-file --dataset "${{ env.DATASET_NAME }}" --token "${{ secrets.LDV_API_TOKEN }}" --account "rce" --url "https://api.linkeddata.cultureelerfgoed.nl" --default-graph-name "https://linkeddata.cultureelerfgoed.nl/rce/${{ env.DATASET_NAME }}/graphs/${{ env.GRAPH_ID }}" --mode "overwrite" ${{ env.ARTIFACT_PATH }} 

  sync-triply:
    runs-on: ubuntu-latest
    if: ${{ inputs.sync-on-push == true }} 
    needs: push-to-triply
    steps:
    - name: Push changes to TriplyDB API via cURL
      run:  |
        curl -H 'Authorization: Bearer ${{ secrets.LDV_API_TOKEN }}' -H 'Content-Type: application/json' -X POST https://api.linkeddata.cultureelerfgoed.nl/datasets/rce/${{ env.DATASET_NAME }}/services/datacatalog -d '{"sync": "true"}'
